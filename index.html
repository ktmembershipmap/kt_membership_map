<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KT 멤버십 우리동네 혜택 지도</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Malgun Gothic', sans-serif; background: #f5f5f7; }
  .container { max-width: 900px; margin: 0 auto; padding: 24px 16px; }
  .header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
  .logo { background: #E8003D; color: #fff; font-size: 14px; font-weight: bold; padding: 5px 12px; border-radius: 6px; }
  .title { font-size: 18px; font-weight: bold; color: #222; }
  .search-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .search-row input {
    flex: 1; padding: 12px 14px; font-size: 15px; border: 1px solid #ddd;
    border-radius: 8px; outline: none;
  }
  .search-row input:focus { border-color: #E8003D; }
  .search-row button {
    padding: 0 22px; font-size: 15px; background: #E8003D; color: #fff;
    border: none; border-radius: 8px; cursor: pointer; font-weight: bold;
  }
  .search-row button:hover { background: #c0002f; }
  .search-row button:disabled { background: #ccc; cursor: not-allowed; }
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .chip {
    font-size: 13px; padding: 6px 14px; border-radius: 20px; border: 1px solid #ddd;
    background: #fff; color: #555; cursor: pointer; transition: all 0.15s;
  }
  .chip.active { background: #E8003D; color: #fff; border-color: #E8003D; }
  .tier-row { display: flex; gap: 6px; margin-bottom: 10px; }
  .tier-chip {
    font-size: 13px; padding: 6px 18px; border-radius: 20px; border: 1px solid #ddd;
    background: #fff; color: #555; cursor: pointer; font-weight: bold; transition: all 0.15s;
  }
  .tier-chip.active { background: #222; color: #fff; border-color: #222; }
  .vvip-tag {
    font-size: 10px; font-weight: bold; color: #8a5a00; background: #FFF3D6;
    padding: 2px 7px; border-radius: 8px; margin-left: 6px; flex-shrink: 0;
  }
  #map { width: 100%; height: 380px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 16px; background: #eee; }
  .count-info { font-size: 14px; color: #555; margin-bottom: 10px; }
  .result-list { display: flex; flex-direction: column; gap: 8px; }
  .result-card {
    background: #fff; border: 1px solid #eee; border-radius: 10px; padding: 12px 16px;
    display: flex; align-items: center; gap: 12px; cursor: pointer; transition: box-shadow 0.15s;
  }
  .result-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .cat-badge { font-size: 11px; padding: 4px 9px; border-radius: 20px; white-space: nowrap; font-weight: bold; flex-shrink: 0; }
  .cat-영화 { background: #E6F1FB; color: #185FA5; }
  .cat-베이커리 { background: #EAF3DE; color: #3B6D11; }
  .cat-아이스크림 { background: #FAEEDA; color: #854F0B; }
  .cat-커피 { background: #EEEDFE; color: #534AB7; }
  .cat-편의점 { background: #E1F5EE; color: #0F6E56; }
  .cat-외식 { background: #FAECE7; color: #712B13; }
  .result-info { flex: 1; min-width: 0; }
  .result-name { font-size: 14px; font-weight: bold; color: #222; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .result-addr { font-size: 12px; color: #888; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .benefit { font-size: 12px; color: #E8003D; font-weight: bold; white-space: nowrap; flex-shrink: 0; }
  .empty, .loading-msg { text-align: center; padding: 40px 0; color: #999; font-size: 14px; }
  .vvip-summary {
    display: none; font-size: 13px; color: #8a5a00; background: #FFF3D6;
    border: 1px solid #F5DFA0; border-radius: 8px; padding: 8px 12px; margin-bottom: 12px;
  }
  .vvip-summary.show { display: block; }
  .vvip-summary strong { color: #6b4400; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <span class="logo">KT</span>
    <span class="title">우리 동네 멤버십 혜택 찾기</span>
  </div>
  <div class="search-row">
    <input type="text" id="addrInput" placeholder="동 이름을 입력하세요 (예: 구의동)" />
    <button id="searchBtn" onclick="doSearch()">검색</button>
  </div>
  <div class="tier-row" id="tierRow">
    <span class="tier-chip active" data-tier="전체" onclick="filterTier(this)">전체</span>
    <span class="tier-chip" data-tier="VVIP" onclick="filterTier(this)">VVIP</span>
    <span class="tier-chip" data-tier="일반" onclick="filterTier(this)">일반</span>
  </div>
  <div class="filter-row" id="filterRow">
    <span class="chip active" data-cat="전체" onclick="filterCat(this)">전체</span>
    <span class="chip" data-cat="영화" onclick="filterCat(this)">영화관</span>
    <span class="chip" data-cat="베이커리" onclick="filterCat(this)">베이커리</span>
    <span class="chip" data-cat="아이스크림" onclick="filterCat(this)">아이스크림</span>
    <span class="chip" data-cat="커피" onclick="filterCat(this)">카페</span>
    <span class="chip" data-cat="편의점" onclick="filterCat(this)">편의점</span>
    <span class="chip" data-cat="외식" onclick="filterCat(this)">외식</span>
  </div>
  <div class="vvip-summary" id="vvipSummary"></div>
  <div id="map"></div>
  <div id="resultArea">
    <div class="empty">동 이름을 입력하고 검색하세요</div>
  </div>
</div>
<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=287151200f1ba977c2dc8bf090f28f39&libraries=services"></script>
<script>
const PARTNERS = [
  // 일반
  { brand: 'CGV',          cat: '영화',      benefit: '최대 5천원 할인(동반 4인 추가할인) / 매점콤보 3천원 할인', tier: '일반' },
  { brand: '롯데시네마',   cat: '영화',      benefit: '최대 5,000원 할인',                 tier: '일반' },
  { brand: '메가박스',     cat: '영화',      benefit: '최대 6천원 할인(본인 동반 4인) / 매점콤보 2천원 할인',     tier: '일반' },
  { brand: '파리바게뜨',   cat: '베이커리',  benefit: '1,000원당 50원 이상 할인',                          tier: '일반' },
  { brand: '뚜레쥬르',     cat: '베이커리',  benefit: '1,000원당 100원 이상 할인',                         tier: '일반' },
  { brand: '파리크라상',   cat: '베이커리',  benefit: '1,000원당 50원 이상 할인',                          tier: '일반' },
  { brand: '배스킨라빈스', cat: '아이스크림', benefit: '[고객보답] 50% 할인(최대 5천원) / [생일] 케이크 4천원 할인', tier: '일반' },
  { brand: '메가MGC커피',  cat: '커피',      benefit: 'ICE 아메리카노 구매 시 500원 할인(3장)',             tier: '일반' },
  { brand: '스타벅스',     cat: '커피',      benefit: '[상시] 사이즈업',                                   tier: '일반' },
  { brand: '공차',         cat: '커피',      benefit: '제조음료 구매 시 10% 할인',                          tier: '일반' },
  { brand: '라그릴리아',   cat: '외식',      benefit: '5% 이상 할인',                                      tier: '일반' },
  { brand: '샐러디',       cat: '외식',      benefit: '10% 할인쿠폰(최대 2만원)',                          tier: '일반' },
  { brand: '도미노피자',   cat: '외식',      benefit: '15% 할인',                                     tier: '일반' },
  { brand: '아웃백',       cat: '외식',      benefit: '5% 이상 할인',                                      tier: '일반' },
  { brand: '파파존스피자', cat: '외식',      benefit: '15% 이상 할인',                                     tier: '일반' },
  { brand: 'VIPS',         cat: '외식',      benefit: '5% 이상 할인',                                      tier: '일반' },
  { brand: '매드포갈릭',   cat: '외식',      benefit: '5% 이상 할인(주문금액 10만원 한도)',                 tier: '일반' },
  { brand: '피자헛',       cat: '외식',      benefit: '15% 할인',                                          tier: '일반' },
  { brand: '피자알볼로',   cat: '외식',      benefit: '15% 할인(온라인 주문 시)',                           tier: '일반' },
  { brand: '미스터피자',   cat: '외식',      benefit: '15% 이상 할인',                                     tier: '일반' },
  { brand: 'GS25',         cat: '편의점',    benefit: '1,000원당 50원 이상 할인',                          tier: '일반' },
  { brand: '이마트24',     cat: '편의점',    benefit: '1,000원당 50원 이상 할인',                          tier: '일반' },
  { brand: 'CU',           cat: '편의점',    benefit: '아침 간편식류 1,000원당 200원 할인',                 tier: '일반' },
  // VVIP
  { brand: '롯데시네마',   cat: '영화',      benefit: '영화 예매 무료',                     tier: 'VVIP', discountAmount: 14000 },
  { brand: '던킨',         cat: '베이커리',  benefit: '아메리카노(S)＋글레이즈드 무료',      tier: 'VVIP', discountAmount: 5600 },
  { brand: '배스킨라빈스', cat: '아이스크림', benefit: '레디팩 무료 / 아이스크림 6종 50%',   tier: 'VVIP', discountAmount: 10800 },
  { brand: '스타벅스',     cat: '커피',      benefit: '아메리카노(S) 무료 or 4천원 할인',    tier: 'VVIP', discountAmount: 4000 },
  { brand: '할리스',       cat: '커피',      benefit: '커피 2잔 ＋ 휘낭시에 2개 세트 무료',  tier: 'VVIP', discountAmount: 14400 },
  { brand: '메가MGC커피',  cat: '커피',      benefit: '아메리카노(ICE/HOT) 2잔 무료',       tier: 'VVIP', discountAmount: 4000 },
  { brand: '도미노피자',   cat: '외식',      benefit: '20% 할인',                          tier: 'VVIP', discountAmount: 6000 },
];

const BRAND_LOGOS = {
  '스타벅스':   'https://image.istarbucks.co.kr/common/img/main/rewards-logo.png',
  '배스킨라빈스': 'https://mblogthumb-phinf.pstatic.net/20160501_237/ppanppane_1462069038100W5NY3_PNG/Untitled-1-14.png?type=w800',
  '던킨':       'https://iprsoftwaremedia.com/285/files/20260/5baa7f2e2cfac254c46e1309_Dunkin%27%20Logo/Dunkin%27%20Logo_3c185c2d-de8c-4c5e-8609-a5685613243d-prv.png'
};

const BRAND_PIN_COLORS = {
  '스타벅스':   '#00704A',
  '배스킨라빈스': '#E4007C',
  '던킨':       '#FF671F'
};

// 브랜드별 로고 원본 비율이 달라서 개별 보정값 지정 (x,y,width,height,fit)
const BRAND_LOGO_STYLE = {
  '스타벅스':   { x: -10, y: 3, width: 60, height: 60, fit: 'slice' }, // 여백 많은 아이콘 -> 확대 + 위쪽 잘림 방지로 세로 위치 조정
  '배스킨라빈스': { x: 5,   y: 4,   width: 30, height: 30, fit: 'slice' },
  '던킨':       { x: 9,   y: 14.6, width: 22, height: 8.7, fit: 'meet' } // 원 지름(26)보다 작게 -> 안 잘림
};

let pinIdCounter = 0;

const CAT_COLORS = {
  '영화':      { bg: '#185FA5', text: '#fff' },
  '베이커리':  { bg: '#3B6D11', text: '#fff' },
  '아이스크림': { bg: '#854F0B', text: '#fff' },
  '커피':      { bg: '#534AB7', text: '#fff' },
  '편의점':    { bg: '#0F6E56', text: '#fff' },
  '외식':      { bg: '#993C1D', text: '#fff' }
};

const ALLOWED_AREAS = [
  '마포구','은평구','종로구','서대문구','용산구','중구','성북구',
  '강북구','도봉구','노원구','중랑구','광진구','성동구','동대문구',
  '고양시','남양주시','구리시','의정부시','양주시','동두천시',
  '파주시','연천군','포천시','가평군','양평군',
  '강원도','강원특별자치도'
];

function isAllowedArea(addr) {
  return ALLOWED_AREAS.some(area => addr.includes(area));
}

let map, ps, geocoder;
let markers = [];
let allResults = [];
let currentCat = '전체';
let currentTier = '전체';
let openInfoWindow = null;
let openInfoTarget = null;

window.onload = function () {
  const mapOption = {
    center: new kakao.maps.LatLng(37.5665, 126.9780),
    level: 5
  };
  map = new kakao.maps.Map(document.getElementById('map'), mapOption);
  ps = new kakao.maps.services.Places();
  geocoder = new kakao.maps.services.Geocoder();

  // 지도 빈 공간 클릭 시 열려있던 정보창 닫기
  kakao.maps.event.addListener(map, 'click', function () {
    if (openInfoWindow) {
      openInfoWindow.close();
      openInfoWindow = null;
      openInfoTarget = null;
    }
  });
};

function getFilteredResults() {
  return allResults
    .filter(r =>
      (currentCat === '전체' || r.cat === currentCat) &&
      (currentTier === '전체' || r.tiers.includes(currentTier))
    )
    .sort((a, b) => (a.tier === 'VVIP' ? 0 : 1) - (b.tier === 'VVIP' ? 0 : 1));
}

function clearMarkers() {
  markers.forEach(m => m.setMap(null));
  markers = [];
}

function doSearch() {
  const input = document.getElementById('addrInput').value.trim();
  if (!input) { alert('동 이름을 입력해주세요.'); return; }
  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  btn.textContent = '검색 중...';
  document.getElementById('resultArea').innerHTML = '<div class="loading-msg">위치를 찾는 중입니다...</div>';

  const hasRegion = input.includes('서울')||input.includes('경기')||input.includes('인천')||input.includes('강원');
  // 지역명이 없으면 경기/서울/강원 순서로 다 시도 (의정부시/포천시 등 '시' 생략 입력도 커버)
  const candidates = hasRegion ? [input] : [input, '경기 ' + input, '서울 ' + input, '강원 ' + input];

  tryGeocode(candidates, 0, btn, input, { foundNotAllowed: false });
}

function tryGeocode(candidates, idx, btn, originalInput, state) {
  if (idx >= candidates.length) {
    tryKeyword(candidates, 0, btn, originalInput, state);
    return;
  }
  geocoder.addressSearch(candidates[idx], function(result, status) {
    if (status === kakao.maps.services.Status.OK) {
      const fullAddr = result[0].address_name || '';
      if (isAllowedArea(fullAddr)) {
        const coords = new kakao.maps.LatLng(result[0].y, result[0].x);
        map.setCenter(coords); map.setLevel(5);
        searchAllPartners(coords);
        return;
      } else {
        state.foundNotAllowed = true;
      }
    }
    tryGeocode(candidates, idx + 1, btn, originalInput, state);
  });
}

function tryKeyword(candidates, idx, btn, originalInput, state) {
  if (idx >= candidates.length) {
    if (state.foundNotAllowed) {
      showNotSupported(btn, originalInput);
    } else {
      btn.disabled = false; btn.textContent = '검색';
      document.getElementById('resultArea').innerHTML =
        '<div class="empty">"' + originalInput + '" 위치를 찾을 수 없습니다.</div>';
    }
    return;
  }
  ps.keywordSearch(candidates[idx], function(data, status2) {
    if (status2 === kakao.maps.services.Status.OK && data.length > 0) {
      const fullAddr = data[0].address_name || '';
      if (isAllowedArea(fullAddr)) {
        const coords = new kakao.maps.LatLng(data[0].y, data[0].x);
        map.setCenter(coords); map.setLevel(5);
        searchAllPartners(coords);
        return;
      } else {
        state.foundNotAllowed = true;
      }
    }
    tryKeyword(candidates, idx + 1, btn, originalInput, state);
  });
}

function showNotSupported(btn, input) {
  btn.disabled = false; btn.textContent = '검색';
  document.getElementById('resultArea').innerHTML =
    '<div class="empty">현재 서비스 지원 지역이 아닙니다.<br>(서울 일부 지역, 경기 북부, 강원도에서 이용 가능합니다)</div>';
}

function searchAllPartners(coords) {
  clearMarkers(); allResults = [];
  let completed = 0;
  const merged = new Map(); // key: kakao place id -> 병합된 매장 정보

  PARTNERS.forEach(partner => {
    ps.keywordSearch(partner.brand, function(data, status) {
      completed++;
      if (status === kakao.maps.services.Status.OK) {
        data.slice(0, 3).forEach(place => {
          const key = place.id;
          const entry = { tier: partner.tier, benefit: partner.benefit, discountAmount: partner.discountAmount };
          if (merged.has(key)) {
            merged.get(key).entries.push(entry);
          } else {
            merged.set(key, {
              name: place.place_name,
              address: place.road_address_name || place.address_name,
              lat: place.y, lng: place.x,
              cat: partner.cat, brand: partner.brand,
              entries: [entry]
            });
          }
        });
      }
      if (completed === PARTNERS.length) {
        allResults = Array.from(merged.values()).map(m => {
          const hasVVIP = m.entries.some(e => e.tier === 'VVIP');
          const primary = m.entries.find(e => e.tier === (hasVVIP ? 'VVIP' : '일반')) || m.entries[0];
          return {
            name: m.name, address: m.address, lat: m.lat, lng: m.lng,
            cat: m.cat, brand: m.brand,
            tier: primary.tier,
            tiers: m.entries.map(e => e.tier),
            benefit: primary.benefit,
            discountAmount: primary.discountAmount,
            entries: m.entries
          };
        });
        finishSearch();
      }
    }, { location: coords, radius: 1500, sort: kakao.maps.services.SortBy.DISTANCE });
  });
}

function finishSearch() {
  const btn = document.getElementById('searchBtn');
  btn.disabled = false; btn.textContent = '검색';
  renderMarkers(); renderResults(); updateVvipSummary();
}

function renderMarkers() {
  clearMarkers();
  if (openInfoWindow) {
    openInfoWindow.close();
  }
  openInfoWindow = null;
  openInfoTarget = null;
  const filtered = getFilteredResults();

  filtered.forEach(r => {
    const color = CAT_COLORS[r.cat] || { bg: '#E8003D', text: '#fff' };
    const position = new kakao.maps.LatLng(r.lat, r.lng);

    const content = document.createElement('div');
    content.style.cssText = 'position:relative;cursor:pointer;';
    const logoUrl = BRAND_LOGOS[r.brand];
    let pinHtml;
    if (logoUrl) {
      const pinColor = BRAND_PIN_COLORS[r.brand] || color.bg;
      const style = BRAND_LOGO_STYLE[r.brand] || { x: 5, y: 4, width: 30, height: 30, fit: 'slice' };
      const clipId = 'logoClip' + (pinIdCounter++);
      pinHtml =
        '<svg width="40" height="50" viewBox="0 0 40 50" style="display:block;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3));">' +
        '<path d="M20 0C9 0 0 8 0 19c0 14 20 31 20 31s20-17 20-31C40 8 31 0 20 0z" fill="' + pinColor + '"/>' +
        '<circle cx="20" cy="19" r="14" fill="#fff"/>' +
        '<clipPath id="' + clipId + '"><circle cx="20" cy="19" r="13"/></clipPath>' +
        '<image href="' + logoUrl + '" x="' + style.x + '" y="' + style.y + '" width="' + style.width + '" height="' + style.height + '" clip-path="url(#' + clipId + ')" preserveAspectRatio="xMidYMid ' + style.fit + '"/>' +
        '</svg>';
    } else {
      pinHtml =
        '<div style="background:' + color.bg + ';color:' + color.text + ';' +
        'font-size:11px;font-weight:bold;padding:4px 9px;border-radius:20px;' +
        'white-space:nowrap;box-shadow:0 2px 5px rgba(0,0,0,0.25);border:2px solid #fff;">' +
        r.cat + '</div>' +
        '<div style="width:0;height:0;margin:0 auto;' +
        'border-left:5px solid transparent;border-right:5px solid transparent;' +
        'border-top:6px solid ' + color.bg + ';"></div>';
    }
    content.innerHTML =
      '<div style="position:absolute;top:-14px;left:-18px;right:-18px;bottom:-10px;"></div>' +
      pinHtml;

    const overlay = new kakao.maps.CustomOverlay({
      position: position,
      content: content,
      yAnchor: 1,
      xAnchor: 0.5,
      zIndex: logoUrl ? 100 : 1
    });
    overlay.setMap(map);

    // 정보창에 position을 미리 지정 -> 임시 마커 없이 바로 해당 좌표에 열림
    const iw = new kakao.maps.InfoWindow({
      position: position,
      zIndex: 200,
      content: '<div style="padding:8px 10px;font-size:12px;width:190px;"><strong>' + r.name + '</strong>' +
        r.entries.map(function(e) {
          const tag = e.tier === 'VVIP'
            ? '<span style="font-size:9px;font-weight:bold;color:#8a5a00;background:#FFF3D6;padding:1px 5px;border-radius:6px;margin-right:4px;">VVIP</span>'
            : '<span style="font-size:9px;font-weight:bold;color:#555;background:#eee;padding:1px 5px;border-radius:6px;margin-right:4px;">일반</span>';
          return '<div style="margin-top:5px;">' + tag + '<span style="color:#E8003D;">' + e.benefit + '</span></div>';
        }).join('') +
        '</div>',
    });

    content.addEventListener('click', function (e) {
      e.stopPropagation();
      if (openInfoTarget === content) {
        openInfoWindow.close();
        openInfoWindow = null;
        openInfoTarget = null;
        return;
      }
      if (openInfoWindow) {
        openInfoWindow.close();
      }
      iw.open(map);
      openInfoWindow = iw;
      openInfoTarget = content;
    });

    markers.push(overlay);
  });
}

function updateVvipSummary() {
  const el = document.getElementById('vvipSummary');
  if (!el) return;
  const visible = getFilteredResults().filter(r => r.tier === 'VVIP' && r.discountAmount);

  const byBrand = {};
  visible.forEach(r => {
    if (!byBrand[r.brand] || r.discountAmount > byBrand[r.brand]) {
      byBrand[r.brand] = r.discountAmount;
    }
  });
  const top3 = Object.entries(byBrand).sort((a, b) => b[1] - a[1]).slice(0, 3);

  if (top3.length === 0) {
    el.classList.remove('show');
    el.innerHTML = '';
    return;
  }
  const names = top3.map(function(t) { return t[0] + ' ' + t[1].toLocaleString() + '원'; }).join(', ');
  el.innerHTML = '<strong>' + names + '</strong> 등 VVIP 혜택 이용 가능 (월 1회)';
  el.classList.add('show');
}

function filterCat(el) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentCat = el.dataset.cat;
  if (allResults.length > 0) { renderMarkers(); renderResults(); updateVvipSummary(); }
}

function filterTier(el) {
  document.querySelectorAll('.tier-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentTier = el.dataset.tier;
  if (allResults.length > 0) { renderMarkers(); renderResults(); updateVvipSummary(); }
}

function renderResults() {
  const resultArea = document.getElementById('resultArea');
  const filtered = getFilteredResults();
  if (filtered.length === 0) {
    resultArea.innerHTML = '<div class="empty">주변에서 제휴처를 찾지 못했습니다.</div>'; return;
  }
  resultArea.innerHTML = '<div class="result-list"><p class="count-info"><strong>' + filtered.length + '개</strong>의 제휴처를 찾았습니다</p>'
    + filtered.map(r =>
      '<div class="result-card" onclick="focusMarker(' + r.lat + ',' + r.lng + ')">'
      + '<span class="cat-badge cat-' + r.cat + '">' + r.cat + (r.tier === 'VVIP' ? '<span class="vvip-tag">VVIP</span>' : '') + '</span>'
      + '<div class="result-info"><div class="result-name">' + r.name + '</div>'
      + '<div class="result-addr">' + r.address + '</div></div>'
      + '<span class="benefit">' + r.benefit + '</span></div>'
    ).join('') + '</div>';
}

function focusMarker(lat, lng) {
  map.setCenter(new kakao.maps.LatLng(lat, lng));
  map.setLevel(3);
}

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('addrInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') doSearch();
  });
});
</script>
</body>
</html>
