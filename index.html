<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KT 멤버십 우리동네 혜택 지도</title>
    <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=f806fa1aae9ac4cdc6c019f4ce1e0882&libraries=services"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        .search-box { margin-bottom: 15px; display: flex; gap: 10px; }
        input { padding: 10px; font-size: 16px; flex: 1; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; font-size: 16px; background-color: #ff0055; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #map { width: 100%; height: 550px; border: 1px solid #ddd; border-radius: 8px; }
    </style>
</head>
<body>
    <h2>KT 멤버십 우리동네 혜택 지도 🗺️</h2>
    <div class="search-box">
        <input type="text" id="dongInput" placeholder="거주하시는 '동'을 입력하세요" onkeypress="if(event.keyCode==13) searchMembership()">
        <button onclick="searchMembership()">혜택 찾기</button>
    </div>
    <div id="map"></div>
    <script>
        const KT_PARTNERS = ["파리바게뜨", "CGV", "GS25", "배스킨라빈스", "뚜레쥬르", "스타벅스", "아웃백", "다이소"];
        var mapContainer = document.getElementById('map'), mapOption = { center: new kakao.maps.LatLng(37.566826, 126.9786567), level: 5 }; 
        var map = new kakao.maps.Map(mapContainer, mapOption);
        var ps = new kakao.maps.services.Places(); var markers = [];
        function searchMembership() {
            var dong = document.getElementById('dongInput').value.trim();
            if (!dong) { alert('동 이름을 입력해주세요!'); return; }
            removeMarkers();
            var bounds = new kakao.maps.LatLngBounds();
            KT_PARTNERS.forEach(function(partner) {
                var keyword = dong + " " + partner;
                ps.keywordSearch(keyword, function(data, status) {
                    if (status === kakao.maps.services.Status.OK) {
                        for (var i = 0; i < data.length; i++) {
                            displayMarker(data[i], partner);
                            bounds.extend(new kakao.maps.LatLng(data[i].y, data[i].x));
                        }
                        map.setBounds(bounds);
                    }
                });
            });
        }
        function displayMarker(place, partner) {
            var marker = new kakao.maps.Marker({ map: map, position: new kakao.maps.LatLng(place.y, place.x) });
            markers.push(marker);
            var infowindow = new kakao.maps.InfoWindow({ zIndex: 1 });
            kakao.maps.event.addListener(marker, 'click', function() {
                infowindow.setContent('<div style="padding:10px;font-size:13px;"><b>' + place.place_name + '</b><br><span style="color:#ff0055;font-weight:bold;">[KT 제휴처]</span></div>');
                infowindow.open(map, marker);
            });
        }
        function removeMarkers() { for (var i = 0; i < markers.length; i++) { markers[i].setMap(null); } markers = []; }
    </script>
</body>
</html>
